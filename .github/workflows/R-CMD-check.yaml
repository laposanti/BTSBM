name: R-CMD-check

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest, r: 'release'}
          - {os: ubuntu-latest, r: 'devel'}
          - {os: windows-latest, r: 'release'}
          - {os: macos-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::roxygen2
          needs: check

      - name: Clean compiled artifacts
        shell: Rscript {0}
        run: |
          patterns <- c("src/*.o", "src/*.obj", "src/*.so", "src/*.dll", "src/*.dylib", "src/*.a", "src/*.lib")
          files <- unlist(lapply(patterns, Sys.glob), use.names = FALSE)
          if (length(files) > 0) {
            unlink(files, force = TRUE)
            message("Removed stale compiled artifacts: ", paste(files, collapse = ", "))
          } else {
            message("No compiled artifacts found in src/.")
          }

      - name: Regenerate docs
        shell: Rscript {0}
        run: |
          roxygen2::roxygenise()
          Rcpp::compileAttributes()

      - name: R CMD check
        shell: Rscript {0}
        run: |
          rcmdcheck::rcmdcheck(
            args = c("--as-cran"),
            error_on = "warning",
            check_dir = "check"
          )
